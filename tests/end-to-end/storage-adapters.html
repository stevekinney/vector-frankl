<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage Adapter E2E Tests</title>
</head>
<body>
    <h1>Storage Adapter E2E Tests</h1>
    <pre id="output"></pre>

    <script type="module">
        // Import adapters from the built bundles.
        const mainModule = await import('/dist/index.js');
        const storageModule = await import('/dist/storage.js');

        const {
            MemoryStorageAdapter,
            IndexedDatabaseStorageAdapter,
            VectorNotFoundError,
        } = mainModule;

        const { OPFSStorageAdapter } = storageModule;

        // ── Helpers ──────────────────────────────────────────────────────

        function makeVector(id, values, metadata) {
            const vector = new Float32Array(values);
            const magnitude = Math.sqrt(values.reduce((sum, v) => sum + v * v, 0));
            const result = { id, vector, magnitude, timestamp: Date.now() };
            if (metadata) {
                result.metadata = metadata;
            }
            return result;
        }

        function calculateMagnitude(vector) {
            let sum = 0;
            for (let i = 0; i < vector.length; i++) {
                sum += vector[i] * vector[i];
            }
            return Math.sqrt(sum);
        }

        function closeTo(actual, expected, precision = 5) {
            const tolerance = Math.pow(10, -precision);
            return Math.abs(actual - expected) < tolerance;
        }

        function assert(condition, message) {
            if (!condition) throw new Error(message);
        }

        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            const sortedA = [...a].sort();
            const sortedB = [...b].sort();
            return sortedA.every((v, i) => v === sortedB[i]);
        }

        // ── Shared behavioral test suite ─────────────────────────────────

        async function runBehavioralSuite(adapter) {
            const results = [];

            async function run(name, fn) {
                try {
                    await adapter.clear();
                    await fn();
                    results.push({ name, passed: true });
                } catch (error) {
                    results.push({ name, passed: false, error: error.message });
                }
            }

            // put/get round-trip
            await run('put/get round-trip', async () => {
                const vec = makeVector('v1', [1, 2, 3], { label: 'test' });
                await adapter.put(vec);
                const retrieved = await adapter.get('v1');
                assert(retrieved.id === 'v1', `Expected id 'v1', got '${retrieved.id}'`);
                assert(closeTo(retrieved.magnitude, vec.magnitude), 'Magnitude mismatch');
                assert(
                    JSON.stringify(retrieved.metadata) === JSON.stringify({ label: 'test' }),
                    'Metadata mismatch',
                );
            });

            // Float32Array preserved
            await run('preserves Float32Array type', async () => {
                const vec = makeVector('float-check', [0.1, 0.2, 0.3]);
                await adapter.put(vec);
                const retrieved = await adapter.get('float-check');
                assert(retrieved.vector instanceof Float32Array, 'Expected Float32Array');
                assert(retrieved.vector.length === 3, 'Expected length 3');
                assert(closeTo(retrieved.vector[0], 0.1, 5), 'vector[0] mismatch');
                assert(closeTo(retrieved.vector[1], 0.2, 5), 'vector[1] mismatch');
                assert(closeTo(retrieved.vector[2], 0.3, 5), 'vector[2] mismatch');
            });

            // get throws on missing
            await run('get throws on missing ID', async () => {
                let threw = false;
                try {
                    await adapter.get('does-not-exist');
                } catch (error) {
                    threw = true;
                    assert(
                        error.message.toLowerCase().includes('not found'),
                        `Expected 'not found' in error, got: ${error.message}`,
                    );
                }
                assert(threw, 'Expected get to throw for missing ID');
            });

            // getMany: found + missing mix
            await run('getMany returns found and skips missing', async () => {
                await adapter.put(makeVector('gm-a', [1, 0]));
                await adapter.put(makeVector('gm-b', [0, 1]));
                const results = await adapter.getMany(['gm-a', 'missing', 'gm-b']);
                const ids = results.map((v) => v.id).sort();
                assert(arraysEqual(ids, ['gm-a', 'gm-b']), `Expected ['gm-a','gm-b'], got ${JSON.stringify(ids)}`);
            });

            // getMany: all missing — some adapters return [], others throw BatchOperationError
            await run('getMany returns empty when all missing', async () => {
                try {
                    const results = await adapter.getMany(['x', 'y', 'z']);
                    assert(results.length === 0, `Expected 0 results, got ${results.length}`);
                } catch (error) {
                    // OPFS adapter throws BatchOperationError when all IDs are missing
                    assert(
                        error.message.toLowerCase().includes('batch') || error.message.toLowerCase().includes('failed'),
                        `Unexpected error: ${error.message}`,
                    );
                }
            });

            // exists
            await run('exists returns false before put', async () => {
                assert((await adapter.exists('nope')) === false, 'Expected false');
            });

            await run('exists returns true after put', async () => {
                await adapter.put(makeVector('present', [1]));
                assert((await adapter.exists('present')) === true, 'Expected true');
            });

            // delete
            await run('delete removes a stored vector', async () => {
                await adapter.put(makeVector('del-me', [1, 2]));
                assert((await adapter.exists('del-me')) === true, 'Expected to exist before delete');
                await adapter.delete('del-me');
                assert((await adapter.exists('del-me')) === false, 'Expected to not exist after delete');
            });

            // delete non-existent is idempotent
            await run('delete non-existent does not throw', async () => {
                await adapter.delete('never-existed');
            });

            // deleteMany
            await run('deleteMany returns count of actually deleted', async () => {
                await adapter.put(makeVector('dm-1', [1]));
                await adapter.put(makeVector('dm-2', [2]));
                await adapter.put(makeVector('dm-3', [3]));
                const deleted = await adapter.deleteMany(['dm-1', 'dm-3', 'no-such-id']);
                assert(deleted === 2, `Expected 2 deleted, got ${deleted}`);
                assert((await adapter.exists('dm-1')) === false, 'dm-1 should be gone');
                assert((await adapter.exists('dm-2')) === true, 'dm-2 should remain');
                assert((await adapter.exists('dm-3')) === false, 'dm-3 should be gone');
            });

            // count
            await run('count returns 0 for empty store', async () => {
                assert((await adapter.count()) === 0, 'Expected 0');
            });

            await run('count returns correct number after inserts', async () => {
                await adapter.put(makeVector('c1', [1]));
                await adapter.put(makeVector('c2', [2]));
                await adapter.put(makeVector('c3', [3]));
                assert((await adapter.count()) === 3, 'Expected 3');
            });

            // getAll
            await run('getAll returns all stored vectors', async () => {
                await adapter.put(makeVector('ga-1', [1, 0]));
                await adapter.put(makeVector('ga-2', [0, 1]));
                const all = await adapter.getAll();
                const ids = all.map((v) => v.id).sort();
                assert(arraysEqual(ids, ['ga-1', 'ga-2']), `Expected ['ga-1','ga-2'], got ${JSON.stringify(ids)}`);
            });

            await run('getAll returns empty for empty store', async () => {
                const all = await adapter.getAll();
                assert(all.length === 0, `Expected empty, got ${all.length}`);
            });

            // clear
            await run('clear removes everything', async () => {
                await adapter.put(makeVector('cl-1', [1]));
                await adapter.put(makeVector('cl-2', [2]));
                assert((await adapter.count()) === 2, 'Expected 2 before clear');
                await adapter.clear();
                assert((await adapter.count()) === 0, 'Expected 0 after clear');
            });

            // putBatch with progress
            await run('putBatch stores all and fires progress', async () => {
                const vectors = Array.from({ length: 25 }, (_, i) =>
                    makeVector(`batch-${i}`, [i, i + 1]),
                );
                const progressReports = [];
                await adapter.putBatch(vectors, {
                    batchSize: 10,
                    onProgress(progress) {
                        progressReports.push({
                            completed: progress.completed,
                            total: progress.total,
                            percentage: progress.percentage,
                        });
                    },
                });
                assert((await adapter.count()) === 25, 'Expected 25 vectors');
                assert(progressReports.length > 0, 'Expected progress reports');
                const last = progressReports[progressReports.length - 1];
                assert(last.completed === 25, `Expected completed=25, got ${last.completed}`);
                assert(last.percentage === 100, `Expected percentage=100, got ${last.percentage}`);
            });

            // putBatch without options
            await run('putBatch without options stores all', async () => {
                const vectors = Array.from({ length: 5 }, (_, i) =>
                    makeVector(`no-opts-${i}`, [i]),
                );
                await adapter.putBatch(vectors);
                assert((await adapter.count()) === 5, 'Expected 5 vectors');
            });

            // putBatch abort signal
            await run('putBatch stops processing when abort signal fires', async () => {
                const vectors = Array.from({ length: 50 }, (_, i) =>
                    makeVector(`abort-${i}`, [i]),
                );

                const controller = new AbortController();

                let batchesSeen = 0;
                const batchPromise = adapter.putBatch(vectors, {
                    batchSize: 10,
                    abortSignal: controller.signal,
                    onProgress() {
                        batchesSeen++;
                        if (batchesSeen === 1) {
                            controller.abort();
                        }
                    },
                });

                let didThrow = false;
                try {
                    await batchPromise;
                } catch {
                    didThrow = true;
                }

                assert(didThrow, 'Expected putBatch to throw on abort');
                const storedCount = await adapter.count();
                assert(storedCount < 50, `Expected fewer than 50 stored, got ${storedCount}`);
            });

            // updateVector
            await run('updateVector replaces data and recalculates magnitude', async () => {
                await adapter.put(makeVector('uv-1', [1, 0, 0]));
                const newValues = new Float32Array([3, 4, 0]);
                await adapter.updateVector('uv-1', newValues);
                const updated = await adapter.get('uv-1');
                assert(updated.vector[0] === 3, 'vector[0] should be 3');
                assert(updated.vector[1] === 4, 'vector[1] should be 4');
                assert(closeTo(updated.magnitude, 5, 1), `Expected magnitude ~5, got ${updated.magnitude}`);
            });

            await run('updateVector throws for missing ID', async () => {
                let threw = false;
                try {
                    await adapter.updateVector('ghost', new Float32Array([1]));
                } catch {
                    threw = true;
                }
                assert(threw, 'Expected updateVector to throw for missing ID');
            });

            // updateVector with updateMagnitude: false
            await run('updateVector skips magnitude recalculation when updateMagnitude is false', async () => {
                await adapter.put(makeVector('uv-mag', [1, 0, 0]));
                const original = await adapter.get('uv-mag');
                const originalMagnitude = original.magnitude;

                await adapter.updateVector('uv-mag', new Float32Array([3, 4, 0]), {
                    updateMagnitude: false,
                });

                const updated = await adapter.get('uv-mag');
                assert(updated.vector[0] === 3, 'vector[0] should be 3');
                assert(updated.vector[1] === 4, 'vector[1] should be 4');
                assert(
                    closeTo(updated.magnitude, originalMagnitude, 1),
                    `Expected magnitude ~${originalMagnitude}, got ${updated.magnitude}`,
                );
            });

            // updateVector with updateTimestamp: false
            await run('updateVector skips timestamp update when updateTimestamp is false', async () => {
                await adapter.put(makeVector('uv-ts', [1, 0, 0]));
                const original = await adapter.get('uv-ts');
                const originalTimestamp = original.timestamp;

                await adapter.updateVector('uv-ts', new Float32Array([3, 4, 0]), {
                    updateTimestamp: false,
                });

                const updated = await adapter.get('uv-ts');
                assert(
                    updated.timestamp === originalTimestamp,
                    `Expected timestamp ${originalTimestamp}, got ${updated.timestamp}`,
                );
            });

            // updateMetadata
            await run('updateMetadata merges by default', async () => {
                await adapter.put(makeVector('um-1', [1], { a: 1, b: 2 }));
                await adapter.updateMetadata('um-1', { b: 99, c: 3 });
                const updated = await adapter.get('um-1');
                assert(updated.metadata.a === 1, 'a should be 1');
                assert(updated.metadata.b === 99, 'b should be 99');
                assert(updated.metadata.c === 3, 'c should be 3');
            });

            await run('updateMetadata replaces when merge is false', async () => {
                await adapter.put(makeVector('um-2', [1], { a: 1, b: 2 }));
                await adapter.updateMetadata('um-2', { x: 10 }, { merge: false });
                const updated = await adapter.get('um-2');
                assert(updated.metadata.x === 10, 'x should be 10');
                assert(updated.metadata.a === undefined, 'a should be gone');
                assert(updated.metadata.b === undefined, 'b should be gone');
            });

            await run('updateMetadata throws for missing ID', async () => {
                let threw = false;
                try {
                    await adapter.updateMetadata('ghost', { key: 'value' });
                } catch {
                    threw = true;
                }
                assert(threw, 'Expected updateMetadata to throw for missing ID');
            });

            // updateMetadata on vector without prior metadata
            await run('updateMetadata sets metadata when none existed', async () => {
                const vec = { id: 'no-meta', vector: new Float32Array([1]), magnitude: 1, timestamp: Date.now() };
                await adapter.put(vec);
                await adapter.updateMetadata('no-meta', { added: true });
                const updated = await adapter.get('no-meta');
                assert(updated.metadata.added === true, 'metadata.added should be true');
            });

            // updateBatch
            await run('updateBatch applies updates and reports partial failures', async () => {
                await adapter.put(makeVector('ub-1', [1], { status: 'old' }));
                await adapter.put(makeVector('ub-2', [2]));
                const result = await adapter.updateBatch([
                    { id: 'ub-1', metadata: { status: 'new' } },
                    { id: 'ub-2', vector: new Float32Array([9, 9]) },
                    { id: 'missing', metadata: { nope: true } },
                ]);
                assert(result.succeeded === 2, `Expected 2 succeeded, got ${result.succeeded}`);
                assert(result.failed === 1, `Expected 1 failed, got ${result.failed}`);
                assert(result.errors.length === 1, `Expected 1 error, got ${result.errors.length}`);
                assert(result.errors[0].id === 'missing', `Expected error for 'missing'`);

                const updated1 = await adapter.get('ub-1');
                assert(updated1.metadata.status === 'new', 'status should be new');

                const updated2 = await adapter.get('ub-2');
                assert(updated2.vector[0] === 9, 'vector[0] should be 9');
                assert(
                    closeTo(updated2.magnitude, Math.sqrt(81 + 81), 1),
                    `Expected magnitude ~${Math.sqrt(162)}, got ${updated2.magnitude}`,
                );
            });

            await run('updateBatch updates both vector and metadata', async () => {
                await adapter.put(makeVector('ub-both', [1], { original: true }));
                const result = await adapter.updateBatch([
                    { id: 'ub-both', vector: new Float32Array([5, 5]), metadata: { updated: true } },
                ]);
                assert(result.succeeded === 1, 'Expected 1 succeeded');
                const updated = await adapter.get('ub-both');
                assert(updated.vector[0] === 5, 'vector[0] should be 5');
                assert(updated.metadata.original === true, 'original should remain');
                assert(updated.metadata.updated === true, 'updated should be added');
                assert(closeTo(updated.magnitude, Math.sqrt(50), 1), 'magnitude mismatch');
            });

            // updateBatch all-success (no failures)
            await run('updateBatch handles all-success batch', async () => {
                await adapter.put(makeVector('ub-ok-1', [1]));
                await adapter.put(makeVector('ub-ok-2', [2]));
                const result = await adapter.updateBatch([
                    { id: 'ub-ok-1', metadata: { done: true } },
                    { id: 'ub-ok-2', metadata: { done: true } },
                ]);
                assert(result.succeeded === 2, `Expected 2 succeeded, got ${result.succeeded}`);
                assert(result.failed === 0, `Expected 0 failed, got ${result.failed}`);
                assert(result.errors.length === 0, `Expected 0 errors, got ${result.errors.length}`);
            });

            // access tracking
            await run('get() increments accessCount', async () => {
                await adapter.put(makeVector('at-1', [1, 2]));
                const first = await adapter.get('at-1');
                assert(first.accessCount === 1, `Expected accessCount=1, got ${first.accessCount}`);
                const second = await adapter.get('at-1');
                assert(second.accessCount === 2, `Expected accessCount=2, got ${second.accessCount}`);
                assert(second.lastAccessed >= first.lastAccessed, 'lastAccessed should not decrease');
            });

            // put sets timestamp when absent
            await run('put sets timestamp when zero', async () => {
                const vec = { id: 'no-ts', vector: new Float32Array([1, 2]), magnitude: Math.sqrt(5), timestamp: 0 };
                await adapter.put(vec);
                const retrieved = await adapter.get('no-ts');
                assert(retrieved.timestamp > 0, 'timestamp should be set');
            });

            // lifecycle
            await run('close() completes without error', async () => {
                await adapter.close();
                await adapter.init();
            });

            await run('init() is idempotent', async () => {
                await adapter.init();
                await adapter.init();
            });

            return results;
        }

        // ── Adapter factory functions ────────────────────────────────────

        function createMemoryAdapter() {
            return new MemoryStorageAdapter();
        }

        function createIndexedDatabaseAdapter(runId) {
            return new IndexedDatabaseStorageAdapter({ name: `e2e-idb-${runId}-${Date.now()}` });
        }

        function createOPFSAdapter(runId) {
            return new OPFSStorageAdapter({ directory: `e2e-opfs-${runId}-${Date.now()}` });
        }

        // ── Main entry point called by Playwright ────────────────────────

        window.runAdapterTests = async function (adapterName) {
            const runId = Math.random().toString(36).slice(2, 8);
            let adapter;

            switch (adapterName) {
                case 'memory':
                    adapter = createMemoryAdapter();
                    break;
                case 'indexeddb':
                    adapter = createIndexedDatabaseAdapter(runId);
                    break;
                case 'opfs':
                    adapter = createOPFSAdapter(runId);
                    break;
                default:
                    return { passed: 0, failed: 1, failures: [{ test: 'setup', error: `Unknown adapter: ${adapterName}` }] };
            }

            try {
                await adapter.init();
            } catch (error) {
                return { passed: 0, failed: 1, failures: [{ test: 'init', error: error.message }] };
            }

            // Run full behavioral suite, clearing between each test
            const allResults = [];

            // We run each test in isolation: init → test → clear
            // The suite function runs all tests sequentially with a shared adapter,
            // but each test gets its own data because we clear between groups.
            const suiteResults = await runBehavioralSuite(adapter);
            allResults.push(...suiteResults);

            // Cleanup
            try {
                await adapter.destroy();
            } catch {
                // Best effort cleanup
            }

            const passed = allResults.filter((r) => r.passed).length;
            const failed = allResults.filter((r) => !r.passed).length;
            const failures = allResults
                .filter((r) => !r.passed)
                .map((r) => ({ test: r.name, error: r.error }));

            return { passed, failed, failures };
        };

        // ── IndexedDB-specific: persistence across reloads ───────────────

        window.setupIndexedDBPersistence = async function () {
            const dbName = 'e2e-idb-persist-test';
            const adapter = new IndexedDatabaseStorageAdapter({ name: dbName });
            await adapter.init();
            await adapter.put(makeVector('persist-1', [1, 2, 3], { saved: true }));
            await adapter.put(makeVector('persist-2', [4, 5, 6], { saved: true }));
            await adapter.close();
            return { dbName, count: 2 };
        };

        window.verifyIndexedDBPersistence = async function (dbName) {
            const adapter = new IndexedDatabaseStorageAdapter({ name: dbName });
            await adapter.init();
            const count = await adapter.count();
            const vec1 = await adapter.get('persist-1');
            const vec2 = await adapter.get('persist-2');
            await adapter.destroy();
            return {
                count,
                vec1Id: vec1.id,
                vec1Metadata: vec1.metadata,
                vec2Id: vec2.id,
                vec2Metadata: vec2.metadata,
            };
        };

        // ── IndexedDB-specific: concurrent writes ────────────────────────

        window.testIndexedDBConcurrency = async function () {
            const dbName = `e2e-idb-concurrent-${Date.now()}`;
            const adapter = new IndexedDatabaseStorageAdapter({ name: dbName });
            await adapter.init();

            const promises = [];
            for (let i = 0; i < 20; i++) {
                promises.push(adapter.put(makeVector(`concurrent-${i}`, [i, i + 1, i + 2])));
            }
            await Promise.all(promises);

            const count = await adapter.count();
            const all = await adapter.getAll();
            await adapter.destroy();

            return { count, allCount: all.length };
        };

        // ── OPFS-specific: destroy removes directory ─────────────────────

        window.testOPFSDestroy = async function () {
            const dirName = `e2e-opfs-destroy-${Date.now()}`;
            const adapter = new OPFSStorageAdapter({ directory: dirName });
            await adapter.init();
            await adapter.put(makeVector('opfs-1', [1, 2, 3]));
            await adapter.destroy();

            // Verify directory is gone
            const root = await navigator.storage.getDirectory();
            let directoryExists = true;
            try {
                await root.getDirectoryHandle(dirName);
            } catch {
                directoryExists = false;
            }

            return { directoryExists };
        };

        // ── OPFS-specific: binary format round-trip ──────────────────────

        window.testOPFSBinaryFormat = async function () {
            const dirName = `e2e-opfs-binary-${Date.now()}`;
            const adapter = new OPFSStorageAdapter({ directory: dirName, format: 'binary' });
            await adapter.init();

            const originalValues = [0.123456789, -0.987654321, 3.14159265, 0.0, -1.0];
            const vec = makeVector('binary-test', originalValues, { format: 'binary' });
            await adapter.put(vec);

            const retrieved = await adapter.get('binary-test');
            await adapter.destroy();

            return {
                isFloat32Array: retrieved.vector instanceof Float32Array,
                length: retrieved.vector.length,
                values: Array.from(retrieved.vector),
                originalValues: Array.from(new Float32Array(originalValues)),
                metadataFormat: retrieved.metadata?.format,
            };
        };

        // Signal that the page is ready
        window.__STORAGE_ADAPTERS_READY__ = true;
    </script>
</body>
</html>
