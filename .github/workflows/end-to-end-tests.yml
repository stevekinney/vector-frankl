name: End-to-End Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  end-to-end-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.2'

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install ${{ matrix.browser }} --with-deps

      - name: Run end-to-end tests
        run: bunx playwright test --project=${{ matrix.browser }}
        env:
          CI: true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-${{ matrix.browser }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  mobile-end-to-end-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.2'

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Install Playwright browsers for mobile testing
        run: bunx playwright install chromium webkit --with-deps

      - name: Run mobile end-to-end tests
        run: bunx playwright test --project=mobile-chrome --project=mobile-safari
        env:
          CI: true

      - name: Upload mobile test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-mobile
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  package-consumer-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.2'

      - name: Install dependencies
        run: bun install

      - name: Create .env file
        run: cp .env.example .env

      - name: Build project
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      # package-consumer.e2e.ts is excluded from the default Playwright config
      # (it needs the packed-tarball consumer server on port 8202), so it runs
      # under its own config here. The dedicated server command packs, installs,
      # and serves the published package exactly as an end-user would consume it.
      - name: Run package-consumer end-to-end tests
        run: bunx playwright test --config=playwright.config.package-consumer.ts
        env:
          CI: true

      - name: Upload package-consumer test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-package-consumer
          path: |
            test-results/
            playwright-report/
          retention-days: 7