name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      recapture_baselines:
        description: 'Recapture performance baselines on the CI runner and commit them to the triggering branch.'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.2'

      - name: Cache Bun dependencies and install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            ~/.cache/bun
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache TypeScript build info
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/tsconfig*.tsbuildinfo
          key: ${{ runner.os }}-ts-${{ hashFiles('**/tsconfig*.json') }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-ts-

      - name: Install dependencies
        run: bun install

      - name: Create .env file
        run: cp .env.example .env

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Check types
        run: bun run typecheck

      - name: Test (core)
        run: bun test --coverage src tests/unit tests/compression tests/debug tests/debug-mock.test.ts

      - name: Test (search, gpu, integration)
        run: bun test --coverage tests/gpu tests/integration tests/search

      - name: Test (vectors, wasm, workers)
        run: bun test --coverage tests/vectors tests/wasm tests/workers

      - name: Test (storage)
        run: bun test --coverage tests/storage

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build output directory 'dist' not found!"
            exit 1
          fi
          if [ ! -f "dist/index.js" ]; then
            echo "❌ Build output file 'dist/index.js' not found!"
            exit 1
          fi
          echo "✅ Build output verified"

      - name: Verify package surface
        run: bun run scripts/check-package.ts

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Build for browser (e2e)
        run: bun run tests/end-to-end/build-for-browser.ts

      - name: Run end-to-end tests (smoke test)
        run: bunx playwright test --project=chromium tests/end-to-end/basic-operations.e2e.ts
        env:
          CI: true

  production-verification:
    name: Production Verification Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.2'

      - name: Cache Bun dependencies and install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            ~/.cache/bun
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Create .env file
        run: cp .env.example .env

      - name: Build
        run: bun run build

      - name: Run production verification gate
        run: bun run verify:production

  recapture-baselines:
    name: Recapture Performance Baselines
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.recapture_baselines }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.2'

      - name: Install dependencies
        run: bun install

      - name: Create .env file
        run: cp .env.example .env

      - name: Recapture baselines on the CI runner
        run: bun run benchmark:production --update-baselines

      - name: Commit updated baselines
        # HUSKY=0 is husky's own opt-out: the local pre-commit hook targets bash
        # and breaks under the runner's /bin/sh, and these are machine-generated
        # baselines committed by a bot — no developer pre-commit checks apply.
        env:
          HUSKY: '0'
        run: |
          if git diff --quiet -- benchmarks/baselines.json; then
            echo "No baseline changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmarks/baselines.json
          git commit -m "chore(benchmarks): recapture baselines on ubuntu-latest CI runner"
          git push origin HEAD:${{ github.ref_name }}
